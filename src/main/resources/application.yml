spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # Spring AI 模型配置（阿里云 DashScope）
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          #qwen-turbo 基础版本不支持联网搜索，需要使用 qwen-turbo-latest 或 qwen-plus 等版本。
          enable-search: true
      embedding:
        options:
          model: text-embedding-v2


# 日志配置（便于调试流程）

logging:
  level:
#    root: DEBUG
    org.langchain4j: DEBUG
    com.example: DEBUG

